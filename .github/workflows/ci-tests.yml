name: OnMyAgent Tests

on:
  pull_request:
    branches:
      - main
    # labeled: re-run when `ci:windows` is applied to force the host gate.
    types: [opened, synchronize, reopened, labeled, unlabeled]
  push:
    branches:
      - main

permissions:
  contents: read

env:
  TURBO_TELEMETRY_DISABLED: "1"
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}

jobs:
  # Path filter / label: skip expensive windows-2022 when PR is unrelated.
  # Force with PR label `ci:windows` (Phase A Windows gate).
  changes:
    name: Detect Windows-relevant paths
    runs-on: ubuntu-latest
    outputs:
      windows: ${{ steps.filter.outputs.windows }}
      reason: ${{ steps.filter.outputs.reason }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Filter paths
        id: filter
        shell: bash
        run: |
          set -euo pipefail

          # PR label override — run Windows host gate even when paths do not match.
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            labels_json='${{ toJson(github.event.pull_request.labels.*.name) }}'
            if printf '%s' "$labels_json" | grep -Fq '"ci:windows"'; then
              echo "windows=true" >> "$GITHUB_OUTPUT"
              echo "reason=label-ci-windows" >> "$GITHUB_OUTPUT"
              echo "Forced by PR label ci:windows"
              exit 0
            fi
          fi

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
          else
            BASE="${{ github.event.before }}"
            # First push / force-push edge: treat as full run.
            if [ -z "$BASE" ] || [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
              echo "windows=true" >> "$GITHUB_OUTPUT"
              echo "reason=no-base-sha" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi
          mapfile -t files < <(git diff --name-only "$BASE" "${{ github.sha }}" || git diff --name-only "$BASE" HEAD)
          # Phase A: desktop/orchestrator + session-archive / workspace roots / desktop bridge
          # (paths that commonly regress on win32). Avoid whole apps/app/** to keep cost down.
          pattern='^(apps/desktop/|apps/orchestrator/|apps/server/src/services/session-archive|apps/server/src/env-file\.ts|apps/server/tests/session-archive|apps/app/src/react-app/domains/workspace/|apps/app/src/react-app/domains/session/chat/session-archive|apps/app/src/app/lib/desktop\.ts|scripts/dev/windows|scripts/lib/run-command\.mjs|package\.json|pnpm-lock\.yaml|constants\.json|\.github/workflows/ci-tests\.yml|docs/windows-compat\.md)'
          # Avoid `printf | head` / `grep -q` under pipefail: early consumer close
          # yields SIGPIPE and fails the job on large merges.
          matched=false
          for f in "${files[@]}"; do
            if [[ "$f" =~ $pattern ]]; then
              matched=true
              break
            fi
          done
          if [ "$matched" = true ]; then
            echo "windows=true" >> "$GITHUB_OUTPUT"
            echo "reason=matched-paths" >> "$GITHUB_OUTPUT"
          else
            echo "windows=false" >> "$GITHUB_OUTPUT"
            echo "reason=no-windows-paths" >> "$GITHUB_OUTPUT"
          fi
          echo "Changed files sample:"
          sample=0
          for f in "${files[@]}"; do
            printf '%s\n' "$f"
            sample=$((sample + 1))
            if [ "$sample" -ge 40 ]; then
              break
            fi
          done

  checks:
    name: Checks (${{ matrix.os }})
    # Skip full Checks when the only trigger is adding/removing a PR label
    # (label re-runs only need Detect + optional windows-compat).
    if: >
      github.event_name != 'pull_request' ||
      (github.event.action != 'labeled' && github.event.action != 'unlabeled')
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.27.0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Get pnpm store path
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v6
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Cache Turbo
        uses: actions/cache@v6
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-checks-${{ github.job }}-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-checks-${{ github.job }}-${{ github.ref_name }}-
            ${{ runner.os }}-turbo-checks-${{ github.job }}-
            ${{ runner.os }}-turbo-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Run workspace checks
        run: pnpm check

      - name: Run rename consistency check
        run: pnpm test:rename-consistency

      # Fail-fast Windows *contracts* (platform-mocked) once on Linux only.
      # Real Windows host gate is windows-compat (path-filtered).
      - name: Run Windows runtime contracts
        if: runner.os == 'Linux'
        run: pnpm test:windows-runtime

  # Real Windows host gate. Skipped when paths miss and no `ci:windows` label.
  # Desktop typecheck lives only in Checks (pnpm check) — TS is OS-agnostic.
  windows-compat:
    name: Windows compat (windows-2022)
    needs: changes
    if: needs.changes.outputs.windows == 'true'
    # Pin VS 2022 layout for node-gyp (same pin as build-electron-desktop).
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.27.0

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Get pnpm store path
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v6
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Windows runtime contracts
        run: pnpm test:windows-runtime
        env:
          ONMYAGENT_WINDOWS_TEST_LOG_DIR: ${{ runner.temp }}/windows-runtime-logs

      - name: Upload Windows runtime logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: windows-runtime-test-logs
          path: ${{ runner.temp }}/windows-runtime-logs/**
          if-no-files-found: ignore

      - name: Windows preflight (ci mode)
        run: node scripts/dev/windows-preflight.mjs --ci

  tests:
    name: ${{ matrix.test.name }} (${{ matrix.os }})
    if: >
      github.event_name != 'pull_request' ||
      (github.event.action != 'labeled' && github.event.action != 'unlabeled')
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]
        test:
          - name: Unit
            command: pnpm test:unit
            needs-opencode: false
          - name: API
            command: pnpm test:api
            needs-opencode: true
          - name: Runtime
            command: pnpm test:runtime
            needs-opencode: true
          - name: UI
            command: pnpm test:ui
            needs-opencode: true

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.27.0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Get pnpm store path
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v6
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Cache Turbo
        uses: actions/cache@v6
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-tests-${{ matrix.test.name }}-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-tests-${{ matrix.test.name }}-${{ github.ref_name }}-
            ${{ runner.os }}-turbo-tests-${{ matrix.test.name }}-
            ${{ runner.os }}-turbo-

      - name: Install OpenCode CLI
        if: matrix.test.needs-opencode
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
          OPENCODE_GITHUB_REPO: ${{ vars.OPENCODE_GITHUB_REPO || 'anomalyco/opencode' }}
        run: |
          set -euo pipefail

          repo="${OPENCODE_GITHUB_REPO:-anomalyco/opencode}"
          version="$(node -e "const fs=require('fs'); const parsed=JSON.parse(fs.readFileSync('constants.json','utf8')); process.stdout.write(String(parsed.opencodeVersion||'').trim().replace(/^v/,''));")"
          version="$(echo "$version" | tr -d '\r\n' | sed 's/^v//')"

          if [ -z "$version" ]; then
            echo "Unable to resolve OpenCode version from constants.json." >&2
            exit 1
          fi

          arch="$(uname -m)"
          case "${RUNNER_OS}" in
            Linux)
              if [ "$arch" = "aarch64" ] || [ "$arch" = "arm64" ]; then
                opencode_asset="opencode-linux-arm64.tar.gz"
              else
                opencode_asset="opencode-linux-x64-baseline.tar.gz"
              fi
              ;;
            macOS)
              if [ "$arch" = "arm64" ]; then
                opencode_asset="opencode-darwin-arm64.zip"
              else
                opencode_asset="opencode-darwin-x64-baseline.zip"
              fi
              ;;
            *)
              echo "Unsupported OS: ${RUNNER_OS}" >&2
              exit 1
              ;;
          esac

          url="https://github.com/${repo}/releases/download/v${version}/${opencode_asset}"
          tmp_dir="$RUNNER_TEMP/opencode"
          extract_dir="$tmp_dir/extracted"
          rm -rf "$tmp_dir"
          mkdir -p "$extract_dir"

          curl_headers=()
          if [ -n "${GITHUB_TOKEN:-}" ]; then
            curl_headers+=( -H "Authorization: Bearer ${GITHUB_TOKEN}" )
          fi

          curl -fsSL --retry 5 --retry-all-errors --retry-delay 2 "${curl_headers[@]}" -o "$tmp_dir/$opencode_asset" "$url"

          if [[ "$opencode_asset" == *.tar.gz ]]; then
            tar -xzf "$tmp_dir/$opencode_asset" -C "$extract_dir"
          else
            unzip -q "$tmp_dir/$opencode_asset" -d "$extract_dir"
          fi

          if [ -f "$extract_dir/opencode" ]; then
            bin_path="$extract_dir/opencode"
          elif [ -f "$extract_dir/opencode.exe" ]; then
            bin_path="$extract_dir/opencode.exe"
          else
            echo "OpenCode binary not found in archive" >&2
            ls -la "$extract_dir"
            exit 1
          fi

          install_dir="$HOME/.opencode/bin"
          mkdir -p "$install_dir"
          cp "$bin_path" "$install_dir/opencode"
          chmod 755 "$install_dir/opencode"
          echo "$install_dir" >> "$GITHUB_PATH"

      - name: Verify OpenCode
        if: matrix.test.needs-opencode
        run: opencode --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Run ${{ matrix.test.name }} tests
        run: ${{ matrix.test.command }}

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [changes, checks, windows-compat, tests]
    if: always()

    steps:
      - name: Verify required jobs
        shell: bash
        run: |
          set -euo pipefail
          event="${{ github.event_name }}"
          action="${{ github.event.action }}"
          checks="${{ needs.checks.result }}"
          windows="${{ needs.windows-compat.result }}"
          tests="${{ needs.tests.result }}"
          # windows-compat may be skipped when no Windows-relevant paths / label.
          windows_ok=0
          if [ "$windows" = "success" ] || [ "$windows" = "skipped" ]; then
            windows_ok=1
          fi
          # Label-only re-run: Checks/tests intentionally skipped; only gate Windows host.
          if [ "$event" = "pull_request" ] && { [ "$action" = "labeled" ] || [ "$action" = "unlabeled" ]; }; then
            if [ "$windows_ok" != "1" ]; then
              echo "label-rerun windows-compat=$windows" >&2
              exit 1
            fi
            echo "label-rerun ok windows-compat=$windows reason=${{ needs.changes.outputs.reason }}"
            exit 0
          fi
          if [ "$checks" != "success" ] || [ "$windows_ok" != "1" ] || [ "$tests" != "success" ]; then
            echo "checks=$checks windows-compat=$windows tests=$tests" >&2
            exit 1
          fi
          echo "checks=$checks windows-compat=$windows tests=$tests"

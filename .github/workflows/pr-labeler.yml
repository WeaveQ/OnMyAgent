# Auto-apply area labels from .github/labeler.yml on PR open/sync.
name: PR Labeler

on:
  pull_request_target:
    types: [opened, reopened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Apply path labels
        uses: actions/labeler@v5
        with:
          configuration-path: .github/labeler.yml
          # Do not remove labels humans added; only add from paths.
          sync-labels: false

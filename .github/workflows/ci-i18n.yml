name: i18n Audit

on:
  pull_request:
    branches:
      - main
    paths:
      - apps/app/src/**
      - scripts/checks/i18n-audit.mjs
  push:
    branches:
      - main
    paths:
      - apps/app/src/**
      - scripts/checks/i18n-audit.mjs

permissions:
  contents: read

jobs:
  i18n-audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc

      - name: Run i18n audit
        run: node scripts/checks/i18n-audit.mjs --ci

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Browser Use Approval Smoke</title>
  </head>
  <body>
    <h1>Approval smoke test</h1>
    <button id="submit" type="button">Submit</button>
    <output id="result">Not submitted</output>
    <script>
      document.querySelector("#submit").addEventListener("click", () => {
        document.querySelector("#result").textContent = "Submitted";
      });
    </script>
  </body>
</html>

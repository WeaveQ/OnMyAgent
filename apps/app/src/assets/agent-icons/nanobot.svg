<svg fill="currentColor" fill-rule="evenodd" height="1em" style="flex:none;line-height:1" viewBox="0 0 24 24" width="1em" xmlns="http://www.w3.org/2000/svg">
  <title>Nano Bot</title>
  <defs>
    <linearGradient id="nano-grad" x1="2" y1="2" x2="22" y2="22" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2DD4BF"/>
      <stop offset="100%" stop-color="#0D9488"/>
    </linearGradient>
  </defs>
  <rect x="3" y="3" width="18" height="18" rx="4" fill="url(#nano-grad)"/>
  <!-- cat ears -->
  <path d="M6.5 6.5L8 1.5h2L9 6.5" fill="url(#nano-grad)" stroke="#0F766E" stroke-width="0.5" stroke-linejoin="round"/>
  <path d="M17.5 6.5L16 1.5h-2l1 5" fill="url(#nano-grad)" stroke="#0F766E" stroke-width="0.5" stroke-linejoin="round"/>
  <!-- face -->
  <circle cx="9.5" cy="10.5" r="1.5" fill="#fff"/>
  <circle cx="14.5" cy="10.5" r="1.5" fill="#fff"/>
  <circle cx="9.5" cy="10.5" r="0.7" fill="#0F766E"/>
  <circle cx="14.5" cy="10.5" r="0.7" fill="#0F766E"/>
  <!-- mouth -->
  <path d="M9.5 14.5 Q12 17 14.5 14.5" fill="none" stroke="#fff" stroke-width="1.2" stroke-linecap="round"/>
  <!-- whiskers -->
  <line x1="4" y1="10" x2="7.5" y2="10.5" stroke="#fff" stroke-width="0.7" stroke-linecap="round" opacity="0.8"/>
  <line x1="4" y1="12" x2="7.5" y2="11.5" stroke="#fff" stroke-width="0.7" stroke-linecap="round" opacity="0.8"/>
  <line x1="20" y1="10" x2="16.5" y2="10.5" stroke="#fff" stroke-width="0.7" stroke-linecap="round" opacity="0.8"/>
  <line x1="20" y1="12" x2="16.5" y2="11.5" stroke="#fff" stroke-width="0.7" stroke-linecap="round" opacity="0.8"/>
</svg>
